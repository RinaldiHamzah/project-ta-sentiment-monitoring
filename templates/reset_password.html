{% extends "base.html" %}
{% block content %}
<div class="auth-shell d-flex align-items-center justify-content-center">
  <div class="auth-panel card border-0 shadow-sm">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <div class="auth-icon mb-3"><i class="bi bi-shield-lock"></i></div>
        <p class="auth-eyebrow mb-2">Reset Password</p>
        <h3 class="fw-bold mb-2">Ganti Password</h3>
        <p class="text-secondary mb-0">Masukkan password baru untuk akun <strong>{{ username }}</strong>.</p>
      </div>

      {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
      {% endif %}

      <form method="post" action="{{ url_for('reset_password_post', username=username) }}">
        <div class="mb-4">
          <label class="form-label fw-semibold">Password Baru</label>
          <div class="input-group input-group-lg">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input name="new_password" type="password" class="form-control" placeholder="Masukkan password baru" required>
          </div>
        </div>
        <button class="btn btn-success w-100 btn-lg">
          <i class="bi bi-check2-circle me-1"></i> Ganti Password
        </button>
      </form>

      <div class="auth-links text-center mt-4">
        <a href="{{ url_for('login') }}" class="text-decoration-none">Kembali ke Login</a>
      </div>
    </div>  
  </div>
</div>

<style>
  .auth-shell { min-height: calc(100vh - 210px); }
  .auth-panel { width: min(100%, 500px); border-radius: 1.25rem; }
  .auth-icon {
    width: 72px; height: 72px; margin: 0 auto; border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(25, 135, 84, 0.10); color: #198754; font-size: 2rem;
  }
  .auth-eyebrow {
    font-size: .75rem; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; color: #0f5fd7;
  }
  .auth-links { font-size: .92rem; }
  [data-bs-theme="dark"] .auth-icon { background: rgba(34, 197, 94, 0.12); color: #86efac; }
  [data-bs-theme="dark"] .auth-eyebrow { color: #93c5fd; }
  @media (max-width: 576px) {
    .auth-shell { min-height: auto; }
    .auth-panel .card-body { padding: 1.1rem !important; }
  }
</style>
{% endblock %}
